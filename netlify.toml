# Netlify 部署：https://docs.netlify.com/configure-builds/overview/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# /api/* 由 netlify/edge-functions/api-proxy.ts 代理（见文件内 export const config），
# 注入与 vite.config 一致的 Referer / Origin / UA。勿再对 /api 使用 redirects 代理。

# React Router 浏览器端路由：必须放在最后
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
