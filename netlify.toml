# Netlify 部署：https://docs.netlify.com/configure-builds/overview/
# 在 app.netlify.com 关联仓库后，一般无需改「构建设置」，本文件会覆盖默认命令与发布目录。

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 生产环境与本地 dev 一样：前端请求 /api/*，由 Netlify 反向代理到各站点（对应 vite.config.ts 里的 proxy）。
# 注意：部分站点可能对 Netlify 出口 IP 限流；若某源失败，可先在 Network 里看 /api/* 响应。
[[redirects]]
  from = "/api/aihot/*"
  to = "https://aihot.virxact.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/bilibili/*"
  to = "https://api.bilibili.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/weibo/*"
  to = "https://weibo.com/:splat"
  status = 200
  force = true

